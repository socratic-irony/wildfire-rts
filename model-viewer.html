<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wildfire RTS — GLB Model Viewer</title>
    <style>
      html, body { height: 100%; margin: 0; }
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background: #111; color: #eaeaea; }
      #app { position: fixed; inset: 0; display: grid; grid-template-rows: auto 1fr; }
      header { display: flex; gap: 12px; align-items: center; padding: 10px 12px; background: #1b1b1b; border-bottom: 1px solid #2a2a2a; }
      header .right { margin-left: auto; display: inline-flex; gap: 10px; align-items: center; }
      label { font-size: 12px; opacity: 0.9; }
      select, input[type="file"], input[type="color"], input[type="range"] { background: #222; color: #eaeaea; border: 1px solid #333; border-radius: 6px; padding: 6px 8px; font-size: 12px; }
      input[type="checkbox"] { vertical-align: middle; }
      #viewer { position: relative; min-height: 0; height: 100%; }
      canvas { display: block; width: 100%; height: 100%; }
      #stats { position: absolute; left: 12px; bottom: 12px; background: rgba(0,0,0,0.55); padding: 8px 10px; border-radius: 8px; font-size: 12px; line-height: 1.2; backdrop-filter: blur(4px); }
      #drop { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; border: 2px dashed #5a8cff; color: #5a8cff; background: rgba(90,140,255,0.06); font-weight: 600; letter-spacing: 0.3px; }
      #drop.show { display: flex; }
      .sep { width: 1px; height: 20px; background: #2a2a2a; }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <strong>Model Viewer</strong>
        <div class="sep"></div>
        <label>
          Load: <input id="file" type="file" accept=".glb,.gltf" />
        </label>
        <label>
          Samples:
          <select id="samples">
            <option value="">— Choose built-in —</option>
            <option value="src/assets/models/firetruck.glb">firetruck.glb</option>
            <option value="src/assets/models/bulldozer.glb">bulldozer.glb</option>
            <option value="src/assets/models/tanker.glb">tanker.glb</option>
            <option value="src/assets/models/helicopter.glb">helicopter.glb</option>
          </select>
        </label>
        <div class="sep"></div>
        <label><input id="toggleGrid" type="checkbox" checked /> Grid</label>
        <label><input id="toggleFog" type="checkbox" checked /> Fog</label>
        <label><input id="toggleShadows" type="checkbox" checked /> Shadows</label>
        <label><input id="toggleWire" type="checkbox" /> Wireframe</label>
        <label><input id="toggleFlat" type="checkbox" /> Flat shading</label>
        <div class="sep"></div>
        <label>BG <input id="bg" type="color" value="#ddeBff" /></label>
        <label>Exposure <input id="exposure" type="range" min="0.2" max="2.2" step="0.05" value="1.0" /></label>
        <label>
          Tone:
          <select id="tone">
            <option value="ACESFilmicToneMapping" selected>ACESFilmic</option>
            <option value="NoToneMapping">None</option>
            <option value="CineonToneMapping">Cineon</option>
            <option value="ReinhardToneMapping">Reinhard</option>
          </select>
        </label>
        <div class="right">
          <span style="opacity:0.7">Orbit: drag • Zoom: wheel • Pan: right-drag</span>
        </div>
      </header>
      <div id="viewer">
        <div id="drop">Drop .glb/.gltf here</div>
        <div id="stats">—</div>
      </div>
    </div>

    <script type="module">
      // Prefer local node_modules so it works offline and when opened directly
      import * as THREE from './node_modules/three/build/three.module.js';
      import { OrbitControls } from './node_modules/three/examples/jsm/controls/OrbitControls.js';
      import { GLTFLoader } from './node_modules/three/examples/jsm/loaders/GLTFLoader.js';
      import { DRACOLoader } from './node_modules/three/examples/jsm/loaders/DRACOLoader.js';
      import { RoomEnvironment } from './node_modules/three/examples/jsm/environments/RoomEnvironment.js';

      const container = document.getElementById('viewer');
      const statsEl = document.getElementById('stats');
      const dropEl = document.getElementById('drop');

      // Renderer: mirror in-game (renderer.ts)
      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      function sizeRendererToContainer() {
        const rect = container.getBoundingClientRect();
        const w = Math.max(1, rect.width);
        // Fallback if clientHeight is 0 due to layout timing: use viewport minus top offset
        const h = Math.max(1, (rect.height || (window.innerHeight - rect.top)));
        renderer.setSize(w, h, false);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
      }
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      container.appendChild(renderer.domElement);

      // Scene + camera: mirror scene.ts + camera.ts
      const scene = new THREE.Scene();
      const defaultBg = new THREE.Color('#DDEBFF');
      scene.background = defaultBg.clone();
      let fog = new THREE.FogExp2(scene.background, 0.008);
      scene.fog = fog;

      const camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 1000);
      camera.position.set(0, 6, 12);
      // Initial size now that camera exists
      sizeRendererToContainer();

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;
      controls.minDistance = 1;
      controls.maxDistance = 400;

      // Lights matching scene.ts
      const hemi = new THREE.HemisphereLight('#DDEBFF', '#CBBBA0', 0.6);
      scene.add(hemi);

      const sun = new THREE.DirectionalLight('#ffd7a1', 1.4);
      sun.position.set(100, 200, 100);
      sun.castShadow = true;
      sun.shadow.mapSize.set(2048, 2048);
      sun.shadow.camera.near = 1;
      sun.shadow.camera.far = 600;
      scene.add(sun);

      // Ground + grid
      const grid = new THREE.GridHelper(400, 80, 0x666666, 0x333333);
      grid.material.opacity = 0.5;
      grid.material.transparent = true;
      scene.add(grid);

      const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(800, 800),
        new THREE.MeshStandardMaterial({ color: 0xf6f6f6, roughness: 1, metalness: 0, side: THREE.DoubleSide })
      );
      ground.rotation.x = -Math.PI / 2;
      ground.receiveShadow = true;
      ground.position.y = 0;
      scene.add(ground);

      // Environment (IBL) for brighter PBR rendering
      const pmrem = new THREE.PMREMGenerator(renderer);
      let envTex = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
      scene.environment = envTex;
      let envIntensity = 1.0;

      // Loaders
      const gltfLoader = new GLTFLoader();
      const draco = new DRACOLoader();
      draco.setDecoderPath('./node_modules/three/examples/jsm/libs/draco/');
      gltfLoader.setDRACOLoader(draco);

      let currentRoot = null;

      function clearCurrent() {
        if (currentRoot) {
          scene.remove(currentRoot);
          currentRoot.traverse(obj => {
            if (obj.geometry) obj.geometry.dispose?.();
            if (obj.material) {
              const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
              mats.forEach(m => m.dispose?.());
            }
          });
          currentRoot = null;
        }
      }

      function countTriangles(object) {
        let tri = 0, meshCount = 0;
        object.traverse(node => {
          if (node.isMesh) {
            meshCount++;
            const geom = node.geometry;
            if (!geom) return;
            if (geom.index) tri += geom.index.count / 3;
            else if (geom.attributes?.position) tri += geom.attributes.position.count / 3;
          }
        });
        return { tri: Math.round(tri), meshCount };
      }

      function applyCommonMaterialSettings(root, { wireframe, flatShading }) {
        root.traverse(node => {
          if (node.isMesh) {
            const mats = Array.isArray(node.material) ? node.material : [node.material];
            mats.forEach(m => {
              if ('wireframe' in m) m.wireframe = !!wireframe;
              if ('flatShading' in m) { m.flatShading = !!flatShading; m.needsUpdate = true; }
            });
            node.castShadow = true;
            node.receiveShadow = true;
          }
        });
      }

      function frameObject(object) {
        const box = new THREE.Box3().setFromObject(object);
        const size = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const dist = Math.max(6, maxDim * 1.6);
        const dir = new THREE.Vector3(1, 0.7, 1).normalize();
        camera.position.copy(center).addScaledVector(dir, dist);
        controls.target.copy(center);
        controls.update();
      }

      function liftToGround(object) {
        const box = new THREE.Box3().setFromObject(object);
        const minY = box.min.y;
        if (isFinite(minY) && minY !== 0) object.position.y -= minY;
      }

      function applyEnvIntensity(root, intensity) {
        root.traverse((n) => {
          const mats = n.isMesh ? (Array.isArray(n.material) ? n.material : [n.material]) : null;
          if (!mats) return;
          mats.forEach((m) => { if ('envMapIntensity' in m) m.envMapIntensity = intensity; });
        });
      }

      async function loadFromUrl(url) {
        clearCurrent();
        const gltf = await gltfLoader.loadAsync(url);
        currentRoot = gltf.scene || gltf.scenes[0];
        scene.add(currentRoot);
        applyCommonMaterialSettings(currentRoot, {
          wireframe: wireCheckbox.checked,
          flatShading: flatCheckbox.checked,
        });
        if (groundFitCheckbox.checked) liftToGround(currentRoot);
        applyEnvIntensity(currentRoot, envIntensity);
        frameObject(currentRoot);
        const { tri, meshCount } = countTriangles(currentRoot);
        statsEl.textContent = `Meshes: ${meshCount} • Tris: ${tri}`;
      }

      async function loadFromFile(file) {
        clearCurrent();
        const arrayBuffer = await file.arrayBuffer();
        return new Promise((resolve, reject) => {
          gltfLoader.parse(arrayBuffer, '', gltf => {
            currentRoot = gltf.scene || gltf.scenes[0];
            scene.add(currentRoot);
            applyCommonMaterialSettings(currentRoot, {
              wireframe: wireCheckbox.checked,
              flatShading: flatCheckbox.checked,
            });
            if (groundFitCheckbox.checked) liftToGround(currentRoot);
            applyEnvIntensity(currentRoot, envIntensity);
            frameObject(currentRoot);
            const { tri, meshCount } = countTriangles(currentRoot);
            statsEl.textContent = `Meshes: ${meshCount} • Tris: ${tri}`;
            resolve();
          }, err => reject(err));
        });
      }

      // UI wiring
      const fileInput = document.getElementById('file');
      const samplesSelect = document.getElementById('samples');
      const gridCheckbox = document.getElementById('toggleGrid');
      const fogCheckbox = document.getElementById('toggleFog');
      const shadowCheckbox = document.getElementById('toggleShadows');
      const wireCheckbox = document.getElementById('toggleWire');
      const flatCheckbox = document.getElementById('toggleFlat');
      const bgPicker = document.getElementById('bg');
      const exposureSlider = document.getElementById('exposure');
      const toneSelect = document.getElementById('tone');
      // Added controls
      const groundFitCheckbox = document.createElement('input');
      groundFitCheckbox.type = 'checkbox';
      groundFitCheckbox.id = 'toggleGroundFit';
      groundFitCheckbox.checked = true;
      const groundFitLabel = document.createElement('label');
      groundFitLabel.appendChild(groundFitCheckbox);
      groundFitLabel.appendChild(document.createTextNode(' Ground fit'));
      document.querySelector('header').insertBefore(groundFitLabel, document.querySelector('header .right'));

      const envLabel = document.createElement('label');
      envLabel.textContent = 'Env Intensity ';
      const envRange = document.createElement('input');
      envRange.type = 'range'; envRange.min = '0'; envRange.max = '3'; envRange.step = '0.05'; envRange.value = '1.2';
      envLabel.appendChild(envRange);
      document.querySelector('header').insertBefore(envLabel, document.querySelector('header .right'));

      fileInput.addEventListener('change', async e => {
        const file = e.target.files?.[0];
        if (file) await loadFromFile(file);
      });
      samplesSelect.addEventListener('change', async e => {
        const url = e.target.value;
        if (url) await loadFromUrl(url);
      });

      gridCheckbox.addEventListener('change', () => { grid.visible = gridCheckbox.checked; });
      fogCheckbox.addEventListener('change', () => { scene.fog = fogCheckbox.checked ? fog : null; });
      shadowCheckbox.addEventListener('change', () => { renderer.shadowMap.enabled = shadowCheckbox.checked; });
      wireCheckbox.addEventListener('change', () => { if (currentRoot) applyCommonMaterialSettings(currentRoot, { wireframe: wireCheckbox.checked, flatShading: flatCheckbox.checked }); });
      flatCheckbox.addEventListener('change', () => { if (currentRoot) applyCommonMaterialSettings(currentRoot, { wireframe: wireCheckbox.checked, flatShading: flatCheckbox.checked }); });
      bgPicker.addEventListener('change', () => { scene.background = new THREE.Color(bgPicker.value); if (scene.fog) scene.fog.color = scene.background; });
      exposureSlider.addEventListener('input', () => { renderer.toneMappingExposure = Number(exposureSlider.value); });
      toneSelect.addEventListener('change', () => {
        const mapping = {
          ACESFilmicToneMapping: THREE.ACESFilmicToneMapping,
          NoToneMapping: THREE.NoToneMapping,
          CineonToneMapping: THREE.CineonToneMapping,
          ReinhardToneMapping: THREE.ReinhardToneMapping,
        };
        renderer.toneMapping = mapping[toneSelect.value] ?? THREE.ACESFilmicToneMapping;
      });
      envRange.addEventListener('input', () => {
        envIntensity = Number(envRange.value);
        if (currentRoot) applyEnvIntensity(currentRoot, envIntensity);
      });
      groundFitCheckbox.addEventListener('change', () => {
        if (currentRoot && groundFitCheckbox.checked) liftToGround(currentRoot);
      });

      // Drag & drop
      window.addEventListener('dragover', e => { e.preventDefault(); dropEl.classList.add('show'); });
      window.addEventListener('dragleave', e => { dropEl.classList.remove('show'); });
      window.addEventListener('drop', async e => {
        e.preventDefault(); dropEl.classList.remove('show');
        const file = e.dataTransfer?.files?.[0];
        if (file && /\.(glb|gltf)$/i.test(file.name)) await loadFromFile(file);
      });

      // Resize
      window.addEventListener('resize', sizeRendererToContainer);

      // Animate
      let last = performance.now();
      function tick() {
        const now = performance.now();
        const dt = Math.min(50, now - last); // clamp
        last = now;
        controls.update();
        renderer.render(scene, camera);
        requestAnimationFrame(tick);
      }
      // Defer initial size until after layout
      requestAnimationFrame(() => { sizeRendererToContainer(); });
      tick();

      // Init UI defaults to match game scene
      document.getElementById('bg').value = '#ddeBff';
      document.getElementById('exposure').value = '1.2';
      renderer.toneMappingExposure = 1.2;

      // Error surface to help diagnose missing modules/assets
      window.addEventListener('error', (e) => {
        statsEl.textContent = `Error: ${e.message}`;
      });
      window.addEventListener('unhandledrejection', (e) => {
        statsEl.textContent = `Error: ${e.reason?.message || e.reason}`;
      });
      // Optional: auto-load first sample if exists
      // loadFromUrl('src/assets/models/firetruck.glb');
    </script>
  </body>
  </html>
